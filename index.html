if(imp.length)awards.push({t:"Most Improved",i:"\u2197",p:imp[0].name,s:imp[0].hcpStart+" \u2192 "+imp[0].hcp});
const dis=wg.map(p=>{const ph=holes.filter(h=>h.player_id===p.id);return{...p,pas:ph.filter(h=>h.strokes-h.par>=5).length}}).sort((a,b)=>b.pas-a.pas);
